name: Nix Build & Cachix Push

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: beehiveserver
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build system
        run: |
          nix build .#nixosConfigurations.beeserver.config.system.build.toplevel

      - name: Push
        run: |
          cachix push beehiveserver $(nix path-info -r ./result)